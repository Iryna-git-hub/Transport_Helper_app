<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 20px;
      }

      .container {
        background-color: #ffffff;
        padding: 28px;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        width: min(100%, 460px);
      }

      h1 {
        text-align: center;
        margin: 0 0 20px;
        color: #0f172a;
        font-size: 1.75rem;
      }

      .search-controls {
        display: grid;
        gap: 10px;
      }

      select,
      button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
      }

      select {
        border: 1px solid #cbd5e1;
        background-color: #fff;
      }

      button {
        background-color: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background-color: #1d4ed8;
      }

      #result {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid #e2e8f0;
        color: #1e293b;
      }
    </style>

    <title>Transportation Helper App</title>
  </head>
  <body>
    <main class="container">
      <h1>Transportation Helper App</h1>

      <section class="search-controls" aria-label="Route search">
        <select id="start">
          <option value="">Select Start Location</option>
          <option value="Helsinki">Helsinki</option>
          <option value="Kamppi">Kamppi</option>
          <option value="Espoo">Espoo</option>
          <option value="Pasila">Pasila</option>
        </select>

        <select id="destination">
          <option value="">Select Destination</option>
          <option value="Metropolia">Metropolia</option>
          <option value="Helsinki">Helsinki</option>
          <option value="Pasila">Pasila</option>
          <option value="Airport">Airport</option>
        </select>

        <button onclick="searchRoute()">Search Route</button>
      </section>

      <section id="result" aria-live="polite"></section>
    </main>

    <script src="transportation.js"></script>
  </body>
</html>
